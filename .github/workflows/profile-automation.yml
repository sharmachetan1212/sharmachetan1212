name: GitHub Profile Automation

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  improve-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROFILE_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate profile README stats
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/generate-stats.js

      - name: Update repository topics
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/update-topics.js

      - name: Update missing repository descriptions
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/update-descriptions.js

      - name: Validate repository quality
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/validate-repos.js

      - name: Commit automation updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update profile automation [skip ci]"
          file_pattern: README.md generated/*.json

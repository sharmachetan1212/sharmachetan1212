name: GitHub Profile Automation

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

concurrency:
  group: profile-automation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  improve-profile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.PROFILE_TOKEN || github.token }}

      - name: Sync default branch
        run: |
          git fetch origin ${{ github.event.repository.default_branch }}
          git reset --hard origin/${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Generate profile README stats
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/generate-stats.js

      - name: Update repository topics
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/update-topics.js

      - name: Update missing repository descriptions
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/update-descriptions.js

      - name: Validate repository quality
        env:
          GH_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/validate-repos.js

      - name: Ensure generated directory exists
        run: mkdir -p generated

      - name: Commit automation updates
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update profile automation [skip ci]"
          file_pattern: README.md
